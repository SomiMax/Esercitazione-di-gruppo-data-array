<div class="card shadow-sm h-100">
  <div class="card-header bg-primary text-white">
    Dettagli Prodotto
  </div>
  
  <div class="card-body" *ngIf="product; else noProduct">
    <h3 class="card-title">{{ product.name }}</h3>
    <h5 class="text-success mb-3">€ {{ product.price }}</h5>
    <p class="card-text">{{ product.description }}</p>
  </div>

  <ng-template #noProduct>
    <div class="card-body text-center text-muted d-flex align-items-center justify-content-center">
      <p class="mb-0">Nessun prodotto selezionato.<br>Clicca su un prodotto nella lista per vederne i dettagli.</p>
    </div>
  </ng-template>
</div>
