<div class="container mt-4">
  <h1 class="mb-4 text-center">Gestione Prodotti</h1>
  
  <div class="row">
    <div class="col-md-7">
      
      <div class="card mb-4 shadow-sm">
        <div class="card-header bg-light"><strong>Aggiungi Nuovo Prodotto</strong></div>
        <div class="card-body d-flex gap-2">
          <input type="text" class="form-control" placeholder="Nome" [(ngModel)]="newProduct.name">
          <input type="number" class="form-control" placeholder="Prezzo" [(ngModel)]="newProduct.price">
          <input type="text" class="form-control" placeholder="Descrizione" [(ngModel)]="newProduct.description">
          <button class="btn btn-success" (click)="addProduct()">Aggiungi</button>
        </div>
      </div>

      <h4>Elenco Prodotti</h4>
      <ul class="list-group shadow-sm">
        <li *ngFor="let product of products" 
            class="list-group-item list-group-item-action d-flex justify-content-between align-items-center"
            (click)="selectProduct(product)"
            style="cursor: pointer;">
          
          <div>
            <strong>{{ product.name }}</strong>
          </div>
          
          <button class="btn btn-sm btn-outline-danger" (click)="deleteProduct(product, $event)">
            Elimina
          </button>
        </li>
      </ul>
      
    </div>

    <div class="col-md-5 mt-4 mt-md-0">
      <app-product-detail [product]="selectedProduct"></app-product-detail>
    </div>
  </div>
</div>
